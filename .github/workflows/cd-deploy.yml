cat > .github/workflows/deploy.yml << 'ENDOFFILE'
name: Deploy (dev)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ap-south-1

jobs:
  ci:
    uses: ./.github/workflows/ci.yml

  terraform-apply:
    needs: ci
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.5"

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform Apply
        working-directory: infrastructure/terraform/envs/dev
        env:
          TF_VAR_github_repo: ${{ github.repository }}
          TF_VAR_llm_api_key: ${{ secrets.LLM_API_KEY }}
        run: |
          terraform init -input=false
          terraform apply -auto-approve -input=false

  build-and-push:
    needs: terraform-apply
    runs-on: ubuntu-latest
    outputs:
      api_image: ${{ steps.meta.outputs.api_image }}
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - id: login
        uses: aws-actions/amazon-ecr-login@v2

      - id: meta
        env:
          REGISTRY: ${{ steps.login.outputs.registry }}
        run: |
          SHA=${GITHUB_SHA::8}
          echo "registry=$REGISTRY" >> "$GITHUB_OUTPUT"
          echo "api_image=$REGISTRY/video-compiler/api:$SHA" >> "$GITHUB_OUTPUT"
          echo "worker_image=$REGISTRY/video-compiler/worker:$SHA" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./infrastructure/docker/Dockerfile.backend
          push: true
          tags: |
            ${{ steps.meta.outputs.api_image }}
            ${{ steps.meta.outputs.registry }}/video-compiler/api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Worker image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./infrastructure/docker/Dockerfile.worker
          push: true
          tags: |
            ${{ steps.meta.outputs.worker_image }}
            ${{ steps.meta.outputs.registry }}/video-compiler/worker:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-api:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update ECS service
        env:
          IMAGE: ${{ needs.build-and-push.outputs.api_image }}
        run: |
          set -euo pipefail
          CLUSTER=video-compiler-dev
          SERVICE=video-compiler-dev-api
          FAMILY=video-compiler-dev-api

          TASKDEF=$(aws ecs describe-task-definition --task-definition "$FAMILY" \
            --query 'taskDefinition' --output json)

          NEW=$(echo "$TASKDEF" | jq --arg IMG "$IMAGE" '
            .containerDefinitions[0].image = $IMG
            | del(.taskDefinitionArn, .revision, .status, .requiresAttributes,
                  .compatibilities, .registeredAt, .registeredBy)')

          REVISION=$(aws ecs register-task-definition \
            --cli-input-json "$NEW" \
            --query 'taskDefinition.taskDefinitionArn' --output text)

          aws ecs update-service --cluster "$CLUSTER" --service "$SERVICE" \
            --task-definition "$REVISION" >/dev/null

          aws ecs wait services-stable --cluster "$CLUSTER" --services "$SERVICE"
          echo "API deployed: $IMAGE"
ENDOFFILE
